sample_rate_target = 44100

[frontend]
kind = "stft"
win_length = 8192
hop_length = 1024
nfft = 8192
window = "hann"

[whitening]
method = "moving_average"
domain = "logmag"
span_bins = 33
rectify_positive = true
floor_eps = 0.00000000999999993922529

[pitch]
midi_min = 40
midi_max = 88
max_harmonics = 10
harmonic_alpha = 0.9924261569976807
local_bandwidth_bins = 2
local_aggregation = "max"
use_subharmonic_penalty = true
lambda_subharmonic = 0.7220890522003174
use_missing_penalty = false
lambda_missing = 0.0

[nms]
threshold_mode = "relative"
threshold_value = 0.7574604153633118
radius_midi_steps = 2
max_polyphony = 4

[templates]
level = "string_region"
num_harmonics = 8
include_harmonic_ratios = true
include_centroid = true
include_rolloff = true
include_flux = true
include_attack_ratio = false
include_noise_ratio = true
include_inharmonicity = true
score_type = "diag_mahalanobis"
feature_normalization = "none"
normalization_epsilon = 0.0000009999999974752427
mahalanobis_std_floor = 0.0010000000474974513
scorer_epsilon = 0.0000009999999974752427
region_bounds = [
    0,
    5,
    10,
    15,
    21,
]

[decode]
alpha = 1.0
beta = 1.0
normalization_epsilon = 0.0000009999999974752427
lambda_conflict = 1000.0
lambda_fret_spread = 0.10000000149011612
lambda_position_prior = 0.019999999552965164
max_candidates_per_pitch = 3
max_global_solutions = 256

[tracking]
mode = "event"
smooth_frames = 3
lambda_switch_string = 0.20000000298023224

[optimization]
search_strategy = "random"
trials = 100
seed = 12345
